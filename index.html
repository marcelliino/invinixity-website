<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenProcessing Sketch</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        window.addEventListener('load', () => {
            const iframe = document.querySelector('iframe');
            const intervalId = setInterval(() => {
                const consoleFrame = iframe.contentWindow.document.querySelector('.pjs-console');
                if (consoleFrame) {
                    consoleFrame.style.display = 'none';
                    clearInterval(intervalId);
                }
            }, 100);
        });
    </script>
</head>
<body>
    <iframe src="https://openprocessing.org/sketch/2229208/embed/?plusEmbedHash=091ce040&userID=262670&plusEmbedFullscreen=true&show=sketch" allowfullscreen></iframe>
</body>
</html>
